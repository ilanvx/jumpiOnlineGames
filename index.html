<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JumpiGames - Kids Games</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="chat.css" />
  </head>
  <body>
    <aside class="sidebar" id="categoriesSidebar">
      <button class="side-btn" data-category="all" title="הכל">
        <i class="fa-solid fa-th"></i>
        <span class="side-btn-label">הכל</span>
      </button>
      <!-- Categories will be loaded dynamically -->
    </aside>

    <header class="topbar">
      <div class="brand">
        <img src="images/logo.png" alt="JumpiGames" />
      </div>

      <div class="bonus" id="dailyBonusDisplay" style="display: none;">
        <div class="coin"><i class="fa-regular fa-gem"></i></div>
        <div class="bonus-text">
          <div class="bonus-amount" id="dailyBonusAmount">0</div>
          <div class="bonus-sub">בונוס יומי</div>
        </div>
      </div>

      <button class="btn icon-only pill-green" id="dailyBonusBtn" data-tip="קבל בונוס יומי" aria-label="קבל בונוס יומי" onclick="checkAndShowDailyBonus()" style="display: none;"><i class="fa-solid fa-gift"></i></button>

      <button class="btn icon-only pill-purple" id="tasksBtn" data-tip="משימות" aria-label="משימות" onclick="toggleTasksModal()" style="display: none;"><i class="fa-solid fa-list-check"></i></button>

      <div class="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input placeholder="חיפוש" />
      </div>
      <button class="btn icon-only pill-blue" id="loginBtn" data-tip="התחברות" aria-label="התחברות" onclick="window.location.href='login.html'">
        <i class="fa-regular fa-user"></i>
      </button>
      <div class="user-menu" id="userMenu" style="display: none;">
        <!-- Notifications Button -->
        <button class="btn icon-only pill-blue notifications-btn" id="notificationsBtn" onclick="toggleNotifications()" data-tip="התראות" aria-label="התראות">
          <i class="fa-solid fa-bell"></i>
          <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
        </button>
        
        <!-- Diamonds Display -->
        <div class="diamonds-display" id="diamondsDisplay" style="display: none;">
          <i class="fa-regular fa-gem"></i>
          <span id="diamondsCount">0</span>
          <button class="diamonds-add-btn" onclick="window.location.href='shop.html'" data-tip="חנות" aria-label="חנות" title="חנות">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        
        <button class="btn pill-blue" id="userBtn" onclick="toggleUserMenu()">
          <i class="fa-regular fa-user"></i>
          <span id="userName"></span>
        </button>
        <div class="user-dropdown" id="userDropdown" style="display: none;">
          <a href="#" id="adminLink" style="display: none;" onclick="window.location.href='admin.html'; return false;">פאנל ניהול</a>
          <a href="#" onclick="handleLogout(); return false;">התנתק</a>
        </div>
      </div>

    <!-- floating tooltip -->
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    </header>

    <!-- Breadcrumb Navigation -->
    <nav class="breadcrumb" id="breadcrumb">
      <a href="/" class="breadcrumb-item">עמוד הבית</a>
    </nav>

    <!-- Bottom Action Bar -->
    <div class="bottom-action-bar">
      <nav class="chips">
        <a href="about.html" class="chip icon-only pill-blue" data-tip="על החברה" aria-label="על החברה">
          <i class="fa-solid fa-building"></i>
        </a>
        <button class="chip icon-only pill-orange no-ads" data-tip="ללא פרסומות" aria-label="ללא פרסומות">
          <i class="fa-solid fa-ban"></i>
        </button>
      <button class="chip icon-only pill-purple" id="chatBtn" data-tip="צ'אט" aria-label="צ'אט" onclick="toggleChat()" style="display: none;">
        <i class="fa-solid fa-comments"></i>
      </button>
      <button class="chip icon-only pill-red" id="favoritesBtn" data-tip="מועדפים" aria-label="מועדפים" onclick="showFavorites()">
        <i class="fa-solid fa-heart"></i>
      </button>
        <a href="#" class="chip icon-only pill-orange" data-tip="מפרסמים" aria-label="מפרסמים"><i class="fa-solid fa-bullhorn"></i></a>
        <a href="#" class="chip icon-only pill-pink" data-tip="מפתחים" aria-label="מפתחים"><i class="fa-solid fa-code"></i></a>
        <a href="#" class="chip icon-only pill-cyan" data-tip="שותפים" aria-label="שותפים"><i class="fa-solid fa-handshake"></i></a>
        <a href="#" class="chip icon-only pill-yellow" data-tip="בלוג" aria-label="בלוג"><i class="fa-solid fa-blog"></i></a>
        <a href="contact.html" class="chip icon-only pill-green" data-tip="יצירת קשר" aria-label="יצירת קשר"><i class="fa-regular fa-envelope"></i></a>
      </nav>
    </div>

    <main class="content">
      <h1 class="title">Kids Games</h1>

      <section class="grid" id="gamesGrid">
        <!-- Games loaded from database -->
      </section>
      
      
    </main>

    <!-- Chat Sidebar -->
    <div id="chatSidebar" class="chat-sidebar" style="display: none;">
      <div class="chat-header">
        <h3>צ'אט</h3>
        <button class="chat-close-btn" onclick="toggleChat()">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>
      
      <div class="chat-content">
        <div class="chat-rooms">
          <div class="chat-rooms-header">
            <h4>חדרים</h4>
            <button class="chat-add-room-btn" onclick="showCreateRoomModal()">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
          <div id="chatRoomsList" class="chat-rooms-list">
            <!-- Rooms will be loaded here -->
          </div>
        </div>
        
        <div class="chat-main">
          <div id="chatMessages" class="chat-messages">
            <div class="chat-welcome">
              <i class="fa-solid fa-comments"></i>
              <p>בחר חדר כדי להתחיל להתכתב</p>
            </div>
          </div>
          
          <div class="chat-typing-indicator" id="chatTypingIndicator" style="display: none;">
            <span id="typingText"></span>
          </div>
          <div class="chat-input-container" id="chatInputContainer" style="display: none;">
            <input type="text" id="chatInput" class="chat-input" placeholder="הקלד הודעה..." />
            <button id="chatSendBtn" class="chat-send-btn" onclick="sendChatMessage()">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Create Room Modal -->
    <div id="createRoomModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>צור חדר חדש</h3>
          <button class="modal-close" onclick="closeCreateRoomModal()">
            <i class="fa-solid fa-times"></i>
          </button>
        </div>
        <form id="createRoomForm" onsubmit="createRoom(event)">
          <div class="form-group">
            <label>שם החדר</label>
            <input type="text" id="roomName" required />
          </div>
          <div class="form-group">
            <label>תיאור (אופציונלי)</label>
            <input type="text" id="roomDescription" />
          </div>
          <button type="submit" class="btn-submit">צור חדר</button>
        </form>
      </div>
    </div>

    <!-- Notifications Modal -->
    <div id="notificationsModal" class="modal" style="display: none;">
      <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
          <h3>התראות</h3>
          <button class="modal-close" onclick="closeNotifications()">
            <i class="fa-solid fa-times"></i>
          </button>
        </div>
        <div id="notificationsList" class="notifications-list">
          <!-- Notifications will be loaded here -->
          <div class="notification-loading" style="text-align: center; padding: 20px; color: var(--muted);">
            טוען התראות...
          </div>
        </div>
      </div>
    </div>

    <!-- Tasks Modal -->
    <div id="tasksModal" class="modal" style="display: none;">
      <div class="modal-content" style="max-width: 700px; max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
          <h3>משימות</h3>
          <button class="modal-close" onclick="closeTasksModal()">
            <i class="fa-solid fa-times"></i>
          </button>
        </div>
        <div style="padding: 20px;">
          <!-- Tabs -->
          <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--panel-2);">
            <button class="task-tab active" onclick="switchTaskTab('daily')" id="dailyTabBtn">
              משימות יומיות
            </button>
            <button class="task-tab" onclick="switchTaskTab('weekly')" id="weeklyTabBtn">
              משימות שבועיות
            </button>
          </div>
          
          <!-- Daily Tasks -->
          <div id="dailyTasksContainer" class="tasks-container">
            <div class="task-loading" style="text-align: center; padding: 20px; color: var(--muted);">
              טוען משימות...
            </div>
          </div>
          
          <!-- Weekly Tasks -->
          <div id="weeklyTasksContainer" class="tasks-container" style="display: none;">
            <div class="task-loading" style="text-align: center; padding: 20px; color: var(--muted);">
              טוען משימות...
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Daily Bonus Modal -->
    <div id="dailyBonusModal" class="modal" style="display: none;">
      <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
          <h3>בונוס יומי! 🎁</h3>
          <button class="modal-close" onclick="closeDailyBonusModal()">
            <i class="fa-solid fa-times"></i>
          </button>
        </div>
        <div style="padding: 20px; text-align: center;">
          <div style="font-size: 64px; margin: 20px 0;">
            <i class="fa-regular fa-gem" style="color: #4CAF50;"></i>
          </div>
          <h2 style="margin: 20px 0; color: var(--text);">קיבלת <span id="dailyBonusRewardAmount" style="color: #4CAF50; font-weight: 800;">0</span> יהלומים!</h2>
          <p style="color: var(--muted); margin-bottom: 30px;" id="dailyBonusMessage">המשך להתחבר מדי יום כדי לקבל פרסים גדולים יותר!</p>
          <div style="display: flex; gap: 8px; justify-content: center; margin: 30px 0; flex-wrap: wrap;" id="dailyBonusStreak">
            <!-- Streak days will be shown here -->
          </div>
          <button class="btn-submit" onclick="claimDailyBonus()" id="claimBonusBtn" style="background: linear-gradient(180deg, var(--pill-1), var(--pill-2)); color: #2b1b5f; padding: 14px 40px; font-weight: 800; font-size: 18px; border-radius: 999px; border: none; cursor: pointer; margin-top: 20px;">
            קבל בונוס
          </button>
          <p style="color: var(--muted); font-size: 14px; margin-top: 20px;" id="nextBonusInfo"></p>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    <script src="chat.js"></script>
    <script src="chat-admin-functions.js"></script>
  </body>
</html>
