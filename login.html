<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JumpiGames - התחברות</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { background: var(--bg); color: var(--text); font-family: 'Heebo', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
      .login-box { background: var(--panel-2); border-radius: 20px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
      .login-header { text-align: center; margin-bottom: 32px; }
      .login-header h1 { font-size: 32px; font-weight: 900; margin: 0 0 8px; }
      .login-header p { color: var(--muted); font-size: 15px; }
      .google-btn { display: inline-block; padding: 12px 24px; background: #fff; color: #333; border-radius: 12px; text-decoration: none; font-weight: 700; transition: all .2s; border: 1px solid #ddd; }
      .google-btn:hover { box-shadow: 0 4px 12px rgba(0,0,0,.15); transform: translateY(-1px); }
      .google-btn i { margin-left: 8px; }
      .divider { text-align: center; margin: 24px 0; color: var(--muted); font-size: 14px; position: relative; }
      .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--chip); }
      .divider::before { right: 0; }
      .divider::after { left: 0; }
      .reg-form { display: none; margin-top: 24px; }
      .reg-form.show { display: block; }
      .form-group { margin-bottom: 18px; }
      .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 14px; }
      .form-group input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--chip); background: var(--panel); color: var(--text); font-size: 15px; font-family: inherit; }
      .form-group input:focus { outline: none; border-color: var(--brand-blue-1); }
      .form-group select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--chip); background: var(--panel); color: var(--text); font-size: 15px; font-family: inherit; }
      .form-group select:focus { outline: none; border-color: var(--brand-blue-1); }
      #usernameStatus { transition: all 0.3s; }
      #usernameStatus.valid { color: #52c41a; }
      #usernameStatus.invalid { color: #ff4d4f; }
      .btn-submit { width: 100%; padding: 14px; border-radius: 12px; border: 0; background: linear-gradient(180deg, var(--brand-blue-1), var(--brand-blue-2)); color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 8px; font-family: 'Heebo', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .btn-submit:hover { opacity: .9; }
      .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; margin-top: 20px; font-size: 14px; }
      .back-link:hover { color: var(--text); }
      .user-info { display: none; text-align: center; }
      .user-info.show { display: block; }
      .user-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; border: 3px solid var(--brand-blue-1); }
      .user-name { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
      .user-email { color: var(--muted); font-size: 14px; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="images/logo.png" alt="JumpiGames" />
      </div>
      <div style="grid-column: span 5"></div>
      <a class="btn pill-blue" href="/" id="topbarBtn">חזרה</a>
    </header>

    <!-- Breadcrumb Navigation -->
    <nav class="breadcrumb" id="breadcrumb">
      <a href="/" class="breadcrumb-item">עמוד הבית</a>
      <span class="breadcrumb-separator">></span>
      <span class="breadcrumb-item active">התחברות / הרשמה</span>
    </nav>

    <main class="login-container">
      <div class="login-box">
        <div class="login-header">
          <h1>ברוכים הבאים</h1>
          <p>התחברו כדי לשמור התקדמות ולגשת למשחקים</p>
        </div>

        <div style="text-align: center; margin: 24px 0;">
          <a href="/auth/google" class="google-btn" id="googleAuthLink">
            <i class="fa-brands fa-google"></i>
            התחבר עם Google
          </a>
        </div>

        <div class="reg-form" id="regForm">
          <h3 style="margin: 0 0 18px; font-size: 24px; font-weight: 900; text-align: center;">ברוכים הבאים לג'אמפי!</h3>
          <form id="completeForm">
            <div class="form-group">
              <label for="username">שם משתמש</label>
              <div style="position: relative;">
                <input type="text" id="username" name="username" minlength="4" maxlength="15" required style="padding-right: 40px;" />
                <span id="usernameStatus" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none;"></span>
              </div>
              <div id="usernameError" style="color: #ff4d4f; font-size: 13px; margin-top: 6px; display: none;"></div>
            </div>
            <div class="form-group">
              <label for="howDidYouHear">איך שמעת עלינו?</label>
              <select id="howDidYouHear" name="howDidYouHear" required>
                <option value="">בחר אפשרות</option>
                <option value="friend">חבר/ה</option>
                <option value="social">רשתות חברתיות</option>
                <option value="search">חיפוש בגוגל</option>
                <option value="ad">פרסומת</option>
                <option value="other">אחר</option>
              </select>
            </div>
            <button type="submit" class="btn-submit">צור את החשבון</button>
          </form>
        </div>

        <div class="user-info" id="userInfo">
          <img src="" alt="" class="user-avatar" id="userAvatar" />
          <div class="user-name" id="userName"></div>
          <div class="user-email" id="userEmail"></div>
          <button class="btn-submit" onclick="handleLogout()" style="margin-top: 20px;">התנתק</button>
        </div>

      </div>
    </main>

    <script>
      // Determine API URL based on current host
      const API_URL = window.location.hostname === 'jumpigames.com' || window.location.hostname === 'www.jumpigames.com' 
        ? 'https://jumpigames.com' 
        : 'http://localhost:3000';
      
      // Update Google auth link
      const googleAuthLink = document.getElementById('googleAuthLink');
      if (googleAuthLink) {
        googleAuthLink.href = `${API_URL}/auth/google`;
      }

      // Check if user is already logged in
      async function checkAuth() {
        try {
          const response = await fetch(`${API_URL}/api/user`, {
            credentials: 'include'
          });
          
          if (response.ok) {
            const user = await response.json();
            if (user) {
              // Return user data without redirecting
              return user;
            }
          }
        } catch (error) {
          console.error('Error checking auth:', error);
        }
        return null;
      }

      // Show user info
      function showUserInfo(user) {
        document.querySelector('.google-btn').parentElement.style.display = 'none';
        document.getElementById('regForm').classList.remove('show');
        const userInfo = document.getElementById('userInfo');
        userInfo.classList.add('show');
        document.getElementById('userAvatar').src = user.picture || '';
        document.getElementById('userName').textContent = user.username || user.name || 'משתמש';
        document.getElementById('userEmail').textContent = user.email || '';
      }

      // Bad words list (Hebrew)
      const badWords = ['זין', 'כוס', 'מזדיין', 'מחורבן', 'מטומטם', 'אידיוט', 'מטופש', 'דביל', 'מפגר', 'משוגע', 'מטורף', 'מטומטמת', 'מחורבנת', 'זונה', 'כלבה', 'מסריח', 'מגעיל', 'חמור', 'בהמה'];

      // Check if username contains bad words
      function containsBadWords(username) {
        const lowerUsername = username.toLowerCase();
        return badWords.some(word => lowerUsername.includes(word.toLowerCase()));
      }

      // Validate username format
      function validateUsernameFormat(username) {
        if (username.length < 4) {
          return { valid: false, error: 'שם המשתמש חייב להיות לפחות 4 תווים' };
        }
        if (username.length > 15) {
          return { valid: false, error: 'שם המשתמש חייב להיות לכל היותר 15 תווים' };
        }
        // Allow Hebrew, English, numbers, and some special characters
        if (!/^[א-תa-zA-Z0-9_\-]+$/.test(username)) {
          return { valid: false, error: 'שם המשתמש יכול להכיל רק אותיות, מספרים, מקף ותחתית' };
        }
        if (containsBadWords(username)) {
          return { valid: false, error: 'שם המשתמש מכיל מילים לא הולמות' };
        }
        return { valid: true };
      }

      // Check username availability
      let checkUsernameTimeout;
      async function checkUsernameAvailability(username) {
        const statusEl = document.getElementById('usernameStatus');
        const errorEl = document.getElementById('usernameError');
        
        // Clear previous timeout
        clearTimeout(checkUsernameTimeout);
        
        // Hide status if empty
        if (!username || username.length === 0) {
          statusEl.textContent = '';
          statusEl.className = '';
          errorEl.style.display = 'none';
          return;
        }

        // Validate format first
        const formatCheck = validateUsernameFormat(username);
        if (!formatCheck.valid) {
          statusEl.textContent = '✗';
          statusEl.className = 'invalid';
          errorEl.textContent = formatCheck.error;
          errorEl.style.display = 'block';
          return;
        }

        // Show loading
        statusEl.textContent = '⏳';
        statusEl.className = '';
        errorEl.style.display = 'none';

        // Debounce - wait 500ms after user stops typing
        checkUsernameTimeout = setTimeout(async () => {
          try {
            const response = await fetch(`${API_URL}/api/user/check-username?username=${encodeURIComponent(username)}`, {
              credentials: 'include'
            });
            
            const data = await response.json();
            
            if (data.available) {
              statusEl.textContent = '✓';
              statusEl.className = 'valid';
              errorEl.style.display = 'none';
            } else {
              statusEl.textContent = '✗';
              statusEl.className = 'invalid';
              errorEl.textContent = 'שם המשתמש כבר תפוס';
              errorEl.style.display = 'block';
            }
          } catch (error) {
            console.error('Error checking username:', error);
            statusEl.textContent = '';
            statusEl.className = '';
          }
        }, 500);
      }

      // Show registration form
      function showRegForm(user) {
        document.querySelector('.google-btn').parentElement.style.display = 'none';
        document.getElementById('regForm').classList.add('show');
        
        // Change topbar button from "חזרה" to "התנתק"
        const topbarBtn = document.getElementById('topbarBtn');
        if (topbarBtn) {
          topbarBtn.textContent = 'התנתק';
          topbarBtn.href = '#';
          topbarBtn.onclick = (e) => {
            e.preventDefault();
            handleLogout();
          };
        }
        
        const usernameInput = document.getElementById('username');
        
        // Add username validation on input
        usernameInput.addEventListener('input', (e) => {
          checkUsernameAvailability(e.target.value);
        });

        // Also check on blur
        usernameInput.addEventListener('blur', (e) => {
          if (e.target.value) {
            checkUsernameAvailability(e.target.value);
          }
        });
        
        document.getElementById('completeForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const username = formData.get('username');
          
          // Validate before submit
          const formatCheck = validateUsernameFormat(username);
          if (!formatCheck.valid) {
            alert(formatCheck.error);
            return;
          }

          // Check availability one more time
          try {
            const checkResponse = await fetch(`${API_URL}/api/user/check-username?username=${encodeURIComponent(username)}`, {
              credentials: 'include'
            });
            const checkData = await checkResponse.json();
            
            if (!checkData.available) {
              alert('שם המשתמש כבר תפוס, נא בחר שם אחר');
              return;
            }
          } catch (error) {
            console.error('Error checking username:', error);
          }
          
          try {
            const response = await fetch(`${API_URL}/api/user/register`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({
                username: username,
                howDidYouHear: formData.get('howDidYouHear')
              })
            });

            if (response.ok) {
              const result = await response.json();
              localStorage.setItem('jumpiUser', JSON.stringify(result.user));
              // Redirect to home page immediately after registration
              window.location.href = '/';
            } else {
              const errorData = await response.json();
              alert(errorData.error || 'שגיאה בהשלמת הרשמה');
            }
          } catch (error) {
            console.error('Error:', error);
            alert('שגיאה בהשלמת הרשמה');
          }
        });
      }

      // Handle logout
      async function handleLogout() {
        try {
          await fetch(`${API_URL}/api/logout`, {
            method: 'POST',
            credentials: 'include'
          });
          localStorage.removeItem('jumpiUser');
          window.location.reload();
        } catch (error) {
          console.error('Error:', error);
          localStorage.removeItem('jumpiUser');
          window.location.reload();
        }
      }

      // Show error message
      function showOAuthError() {
        const loginBox = document.querySelector('.login-box');
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'background: rgba(255,77,79,.1); border: 2px solid #ff4d4f; padding: 20px; border-radius: 12px; margin: 20px 0; color: #ff4d4f;';
        errorDiv.innerHTML = `
          <h3 style="margin: 0 0 12px;">❌ שגיאת התחברות</h3>
          <p style="margin: 0 0 12px;"><strong>שגיאה 400: redirect_uri_mismatch</strong></p>
          <p style="margin: 0 0 12px;">ה-callback URL לא רשום ב-Google Cloud Console.</p>
          <p style="margin: 12px 0;"><strong>הוסף את ה-URL הבא:</strong></p>
          <code style="display: block; background: rgba(0,0,0,.3); padding: 8px; border-radius: 6px; margin: 8px 0; font-size: 13px;" id="callbackUrlDisplay">${API_URL}/auth/google/callback</code>
          <ol style="text-align: right; margin: 12px 0 0 20px; font-size: 13px;">
            <li>לך ל-<a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color: #a5b4ff;">Google Cloud Console</a></li>
            <li>בחר את ה-Client ID שלך</li>
            <li>ב-"Authorized redirect URIs" הוסף את ה-URL למעלה</li>
            <li>לחץ SAVE</li>
          </ol>
        `;
        loginBox.insertBefore(errorDiv, loginBox.firstChild);
      }

      // Check URL for success parameter
      window.onload = async function () {
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('error') === 'oauth_failed') {
          showOAuthError();
        } else if (urlParams.get('success') === '1') {
          // User came back from Google OAuth
          // Hide Google button immediately to prevent loop
          document.querySelector('.google-btn').parentElement.style.display = 'none';
          
          // Show loading message
          const loginBox = document.querySelector('.login-box');
          const loadingDiv = document.createElement('div');
          loadingDiv.id = 'loadingMessage';
          loadingDiv.style.cssText = 'background: rgba(82,196,26,.1); border: 2px solid #52c41a; padding: 20px; border-radius: 12px; margin: 20px 0; color: #52c41a; text-align: center;';
          loadingDiv.innerHTML = `
            <h3 style="margin: 0 0 12px;">⏳ מאמת התחברות...</h3>
            <p style="margin: 0;">אנא המתן...</p>
          `;
          loginBox.insertBefore(loadingDiv, loginBox.firstChild);
          
          // Try to get user data (with multiple retries if session not yet saved)
          let userData = null;
          const maxRetries = 5;
          const retryDelay = 1000; // 1 second
          
          for (let i = 0; i < maxRetries; i++) {
            userData = await checkAuth();
            
            if (userData) {
              break; // Got user data, exit loop
            }
            
            if (i < maxRetries - 1) {
              console.log(`Waiting for session to be saved... (attempt ${i + 1}/${maxRetries})`);
              await new Promise(resolve => setTimeout(resolve, retryDelay));
            }
          }
          
          // Remove loading message
          const loadingEl = document.getElementById('loadingMessage');
          if (loadingEl) {
            loadingEl.remove();
          }
          
          if (userData) {
            if (!userData.registered || !userData.username) {
              // User is not registered - show registration form
              showRegForm(userData);
            } else {
              // User is already registered - redirect to home
              localStorage.setItem('jumpiUser', JSON.stringify(userData));
              window.location.href = '/';
            }
          } else {
            // Failed to get user data even after retries - show error message
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'background: rgba(255,77,79,.1); border: 2px solid #ff4d4f; padding: 20px; border-radius: 12px; margin: 20px 0; color: #ff4d4f; text-align: center;';
            errorDiv.innerHTML = `
              <h3 style="margin: 0 0 12px;">⚠️ שגיאה בהתחברות</h3>
              <p style="margin: 0 0 12px;">לא הצלחנו לקבל את פרטי המשתמש. נסה לרענן את הדף או להתחבר שוב.</p>
              <div style="display: flex; gap: 10px; justify-content: center; margin-top: 12px;">
                <button onclick="window.location.reload()" style="padding: 10px 20px; background: #ff4d4f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">רענן דף</button>
                <button onclick="window.location.href='/auth/google'" style="padding: 10px 20px; background: #1890ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">התחבר שוב</button>
              </div>
            `;
            loginBox.insertBefore(errorDiv, loginBox.firstChild);
          }
        } else {
          // Check if already logged in (not coming from OAuth)
          const userData = await checkAuth();
          if (userData) {
            if (userData.registered && userData.username) {
              // User is logged in and registered - redirect to home
              localStorage.setItem('jumpiUser', JSON.stringify(userData));
              window.location.href = '/';
            } else {
              // User is logged in but not registered - show registration form
              showRegForm(userData);
            }
          }
        }
      };
    </script>
  </body>
</html>
